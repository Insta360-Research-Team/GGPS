# 由 tools/gen_360_yamls.py 从本模板生成 config_360/omniblender_<scene>.yaml
# 占位符 <DATA_ROOT>/OmniBlender / pavilion_midday_pond 会被替换为数据根与场景目录名
# 数据来源: OmniBlender（ERP 全景，2000x1000；无原生点云，转换脚本会生成随机点云）
# 转换前置: python tools/convert_omniblender_to_colmap.py --root <DATA_ROOT>/OmniBlender

model_params: {
    model_config: {
        name: "GaussianModel",
        kwargs: {}
    },
    sh_degree: 3,
    source_path: "data/pavilion_midday_pond",
    model_path: "./output/omniblender_pavilion_midday_pond",
    images: "imgs",
    alpha_masks: "",
    use_alpha_masks: False,
    use_sky_masks: False,
    use_depth: False,
    resolution: 1,
    white_background: False,
    data_device: "cpu",
    eval: True,
    skybox_num: 0,
    skybox_locked: True,
    default_camera_type: 3,
}

pipeline_params: {
    convert_SHs_python: False,
    compute_cov3D_python: False,
    debug: False
}

optim_params: {
    iterations: 30_000,
    position_lr_init: 0.00016,
    position_lr_final: 0.0000016,
    position_lr_delay_mult: 0.01,
    position_lr_max_steps: 30_000,
    feature_lr: 0.0025,
    opacity_lr: 0.025,
    scaling_lr: 0.005,
    rotation_lr: 0.001,
    percent_dense: 0.01,
    lambda_dssim: 0.2,
    densification_interval: 100,
    opacity_reset_interval: 3000,
    densify_from_iter: 500,
    densify_until_iter: 15_000,
    densify_grad_threshold: 0.0002,
    densify_grad_abs_threshold: 0.0004,
    prune_by_extent: false,
    depth_l1_weight_init: 0,
    depth_l1_weight_final: 0,
    max_cache_num: 512,
}
